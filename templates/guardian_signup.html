<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartyBee - Guardian Signup</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="login-page guardian-theme">

    <!-- ================= LOADING SCREEN ================= -->
    <div id="loading-screen">
        <div class="loader-content">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="SmartyBee" class="pulsing-logo">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- ================= SIGNUP CARD ================= -->
    <div class="login-container">
        <div class="login-card bounce-in">

            <div class="logo-section">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Bee" class="static-logo"
                    width="500px">
            </div>

            <h1>Guardian <span class="highlight-text">Registration</span></h1>
            <p>Create your account to manage child learning</p>

            <form id="signup-form" onsubmit="handleSignup(event)">

                <!-- USERNAME -->
                <div class="input-group">
                    <label for="username"><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" placeholder="Choose a username" required autocomplete="off">
                </div>

                <!-- FULL NAME -->
                <div class="input-group">
                    <label for="fullname"><i class="fas fa-id-card"></i> Full Name</label>
                    <input type="text" id="fullname" placeholder="Your full name" required autocomplete="off">
                </div>

                <!-- PASSWORD -->
                <div class="input-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <div class="password-container">
                        <input type="password" id="password" placeholder="At least 6 characters" required minlength="6">
                        <i class="far fa-eye toggle-password" onclick="togglePassword('password')"></i>
                    </div>
                </div>

                <!-- CONFIRM PASSWORD -->
                <div class="input-group">
                    <label for="confirm-password"><i class="fas fa-lock"></i> Confirm Password</label>
                    <div class="password-container">
                        <input type="password" id="confirm-password" placeholder="At least 6 characters" required
                            minlength="6">
                        <i class="far fa-eye toggle-password" onclick="togglePassword('confirm-password')"></i>
                    </div>
                </div>

                <!-- SIGNUP BUTTON -->
                <button type="submit" class="btn-cta-primary full-width">
                    Create Account
                </button>

            </form>

            <p style="margin-top: 15px; text-align: center;">
                Already have an account?
                <a href="{{ url_for('guardian_login') }}" style="color: #0984e3; font-weight: bold;">Login here</a>
            </p>

            <p id="error-msg" class="error-text" style="margin-top: 15px; margin-bottom: 0;"></p>
            <p id="success-msg" class="success-text" style="margin-top: 15px; margin-bottom: 0; color: green;"></p>

        </div>
    </div>

    <!-- ================= SCRIPT ================= -->
    <script>
        /* ---------- LOADING SCREEN ---------- */
        window.addEventListener("load", () => {
            const loader = document.getElementById("loading-screen");
            setTimeout(() => {
                loader.style.opacity = "0";
                setTimeout(() => loader.style.display = "none", 500);
            }, 1000);
        });

        /* ---------- PASSWORD TOGGLE ---------- */
        function togglePassword(fieldId) {
            const passwordInput = document.getElementById(fieldId);
            const icon = passwordInput.nextElementSibling;
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        /* ---------- SIGNUP HANDLER ---------- */
        async function handleSignup(event) {
            event.preventDefault();

            const username = document.getElementById("username").value.trim();
            const fullname = document.getElementById("fullname").value.trim();
            const password = document.getElementById("password").value.trim();
            const confirmPassword = document.getElementById("confirm-password").value.trim();
            const errorMsg = document.getElementById("error-msg");
            const successMsg = document.getElementById("success-msg");

            errorMsg.innerText = "";
            successMsg.innerText = "";

            // Validation
            if (!username || !fullname || !password || !confirmPassword) {
                errorMsg.innerText = "Please fill in all fields!";
                return;
            }

            if (password !== confirmPassword) {
                errorMsg.innerText = "Passwords do not match!";
                return;
            }

            if (password.length < 6) {
                errorMsg.innerText = "Password must be at least 6 characters!";
                return;
            }

            try {
                const response = await fetch("/api/guardian-signup", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username: username,
                        fullname: fullname,
                        password: password
                    })
                });

                const result = await response.json();

                if (result.success) {
                    successMsg.innerText = "Account created! Redirecting to login...";
                    setTimeout(() => {
                        window.location.href = "/guardian-login";
                    }, 2000);
                } else {
                    errorMsg.innerText = result.message || "Registration failed!";
                }

            } catch (error) {
                errorMsg.innerText = "Server error. Please try again!";
            }
        }
    </script>

</body>

</html>
