<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartyBee - Child Signup</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="login-page child-theme">

    <!-- ================= LOADING SCREEN ================= -->
    <div id="loading-screen">
        <div class="loader-content">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="SmartyBee" class="pulsing-logo">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- ================= SIGNUP CARD ================= -->
    <div class="login-container">
        <div class="login-card bounce-in child-card-style">

            <div class="logo-section">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Bee" class="static-logo"
                    width="500px">
            </div>

            <h1>Join the <span class="highlight-text-child">Bee Family!</span> 🐝</h1>
            <p>Create your account and start learning! 🌟</p>

            <form id="signup-form" onsubmit="handleSignup(event)">

                <!-- USERNAME -->
                <div class="input-group">
                    <label for="username"><i class="fas fa-user-circle"></i> Username</label>
                    <input type="text" id="username" placeholder="Pick a cool username" required autocomplete="off">
                </div>

                <!-- CHILD NAME -->
                <div class="input-group">
                    <label for="childname"><i class="fas fa-child"></i> Your Name</label>
                    <input type="text" id="childname" placeholder="What's your name?" required autocomplete="off">
                </div>

                <!-- AGE -->
                <div class="input-group">
                    <label for="age"><i class="fas fa-birthday-cake"></i> Age</label>
                    <input type="number" id="age" placeholder="How old are you?" required min="3" max="12">
                </div>

                <!-- PASSWORD -->
                <div class="input-group">
                    <label for="password"><i class="fas fa-key"></i> Password</label>
                    <div class="password-container">
                        <input type="password" id="password" placeholder="........" required>
                        <i class="far fa-eye toggle-password" onclick="togglePassword('password')"></i>
                    </div>
                </div>

                <!-- CONFIRM PASSWORD -->
                <div class="input-group">
                    <label for="confirm-password"><i class="fas fa-key"></i> Confirm Password</label>
                    <div class="password-container">
                        <input type="password" id="confirm-password" placeholder="........" required>
                        <i class="far fa-eye toggle-password" onclick="togglePassword('confirm-password')"></i>
                    </div>
                </div>

                <!-- SIGNUP BUTTON -->
                <button type="submit" class="btn-cta-primary full-width child-btn">
                    Let's Start Learning! 🚀
                </button>

            </form>

            <p style="margin-top: 15px; text-align: center;">
                Already have an account?
                <a href="{{ url_for('child_login') }}" style="color: #fdcb6e; font-weight: bold;">Login here</a>
            </p>

            <p id="error-msg" class="error-text" style="display:none;"></p>
            <p id="success-msg" class="success-text" style="display:none;"></p>

        </div>
    </div>

    <!-- ================= POPUP MODAL ================= -->
    <div id="popup-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; justify-content:center; align-items:center;">
        <div style="background:white; border-radius:20px; padding:30px 35px; max-width:400px; width:90%; text-align:center; animation: popIn 0.3s ease; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
            <div id="popup-icon" style="font-size:3rem; margin-bottom:10px;">⚠️</div>
            <h2 id="popup-title" style="margin:0 0 10px 0; font-family:'Fredoka',sans-serif; color:#333;">Error</h2>
            <p id="popup-message" style="color:#555; font-size:1rem; margin-bottom:20px; line-height:1.5;"></p>
            <button onclick="closePopup()" style="background:linear-gradient(135deg,#FFC107,#FF9800); color:white; border:none; padding:12px 40px; border-radius:50px; font-size:1rem; font-weight:600; cursor:pointer; font-family:'Fredoka',sans-serif; transition:transform 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">OK</button>
        </div>
    </div>
    <style>
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>

    <!-- ================= SCRIPT ================= -->
    <script>
        /* ---------- LOADING SCREEN ---------- */
        window.addEventListener("load", () => {
            const loader = document.getElementById("loading-screen");
            setTimeout(() => {
                loader.style.opacity = "0";
                setTimeout(() => loader.style.display = "none", 500);
            }, 1000);
        });

        /* ---------- PASSWORD TOGGLE ---------- */
        function togglePassword(fieldId) {
            const passwordInput = document.getElementById(fieldId);
            const icon = passwordInput.nextElementSibling;
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        /* ---------- POPUP FUNCTIONS ---------- */
        function showPopup(title, message, isSuccess = false) {
            document.getElementById('popup-icon').innerText = isSuccess ? '✅' : '⚠️';
            document.getElementById('popup-title').innerText = title;
            document.getElementById('popup-title').style.color = isSuccess ? '#00b894' : '#ef4444';
            document.getElementById('popup-message').innerText = message;
            document.getElementById('popup-modal').style.display = 'flex';
        }
        function closePopup() {
            document.getElementById('popup-modal').style.display = 'none';
        }

        /* ---------- SIGNUP HANDLER ---------- */
        async function handleSignup(event) {
            event.preventDefault();

            const username = document.getElementById("username").value.trim();
            const childname = document.getElementById("childname").value.trim();
            const age = parseInt(document.getElementById("age").value);
            const password = document.getElementById("password").value.trim();
            const confirmPassword = document.getElementById("confirm-password").value.trim();

            // Validation
            if (!username || !childname || !age || !password || !confirmPassword) {
                showPopup('Missing Fields', 'Please fill in all fields!');
                return;
            }

            if (age < 3 || age > 12) {
                showPopup('Invalid Age', 'Age must be between 3 and 12!');
                return;
            }

            if (password !== confirmPassword) {
                showPopup('Password Mismatch', 'Passwords do not match!');
                return;
            }

            if (password.length < 3) {
                showPopup('Weak Password', 'Password must be at least 3 characters!');
                return;
            }

            try {
                const response = await fetch("/api/child-signup", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username: username,
                        childname: childname,
                        age: age,
                        password: password
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showPopup('Success!', '🎉 Account created! Taking you to login...', true);
                    setTimeout(() => {
                        window.location.href = "/child-login";
                    }, 2000);
                } else {
                    showPopup('Registration Failed', result.message || 'Registration failed!');
                }

            } catch (error) {
                showPopup('Server Error', 'Server error. Please try again!');
            }
        }
    </script>

</body>

</html>
