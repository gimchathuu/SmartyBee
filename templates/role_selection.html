<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartyBee - Who are you?</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Styles - Using same as login page -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* Role selection specific styles */
        .role-selection-card {
            max-width: 600px;
            margin: 0 auto;
        }

        .role-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }

        .role-option {
            background: linear-gradient(135deg, #FFF8E1 0%, #FFD54F 20%);
            border: 2px solid #FFC107;
            border-radius: 15px;
            padding: 30px 20px;
            text-align: center;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.15);
        }

        .role-option:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(255, 193, 7, 0.3);
            border-color: #FF9800;
        }

        .role-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            color: #FF9800;
        }

        .role-option h3 {
            font-size: 1.4rem;
            margin: 10px 0 5px 0;
            font-weight: 700;
            color: #333;
        }

        .role-option p {
            font-size: 0.9rem;
            color: #666;
            margin: 0;
        }

        .divider {
            margin: 30px 0;
            text-align: center;
            color: #888;
            font-size: 0.95rem;
        }

        .signup-options {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .signup-btn {
            background: white;
            border: 2px solid #FFC107;
            color: #FF9800;
            padding: 10px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .signup-btn:hover {
            background: #FFF8E1;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 193, 7, 0.2);
        }
    </style>
</head>

<body class="login-page">

    <!-- ================= LOADING SCREEN ================= -->
    <div id="loading-screen">
        <div class="loader-content">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="SmartyBee" class="pulsing-logo">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- ================= ROLE SELECTION CARD ================= -->
    <div class="login-container role-selection-card">
        <div class="login-card bounce-in">

            <div class="logo-section">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="SmartyBee" class="static-logo"
                    width="80">
            </div>

            <h1>Welcome to <span class="highlight-text">SmartyBee</span></h1>
            <p>Who is using the app? 🐝</p>

            <!-- Role Options -->
            <div class="role-options">

                <!-- Guardian Option -->
                <a href="{{ url_for('guardian_login') }}" class="role-option">
                    <div class="role-icon">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <h3>Guardian</h3>
                    <p>Parents & Teachers</p>
                </a>

                <!-- Child User Option -->
                <a href="{{ url_for('child_login') }}" class="role-option">
                    <div class="role-icon">
                        <i class="fas fa-child"></i>
                    </div>
                    <h3>Child</h3>
                    <p>Let's Learn!</p>
                </a>

            </div>



        </div>
    </div>

    <!-- ================= SCRIPT ================= -->
    <script>
        /* ---------- LOADING SCREEN ---------- */
        window.addEventListener("load", () => {
            const loader = document.getElementById("loading-screen");
            setTimeout(() => {
                loader.style.opacity = "0";
                setTimeout(() => loader.style.display = "none", 500);
            }, 1000);
        });
    </script>

</body>

</html>
