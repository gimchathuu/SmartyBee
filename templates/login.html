<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartyBee - Login</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="login-page">

    <!-- ================= LOADING SCREEN ================= -->
    <div id="loading-screen">
        <div class="loader-content">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="SmartyBee" class="pulsing-logo">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- ================= LOGIN CARD ================= -->
    <div class="login-container">
        <div class="login-card bounce-in">

            <div class="logo-section">
                <!-- Using logo from static if available -->
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Bee" class="static-logo"
                    width="500px">
            </div>

            <h1>Welcome to <span class="highlight-text">SmartyBee</span></h1>
            <p>Sign in to continue your learning adventure!</p>

            <form id="login-form" onsubmit="handleLogin(event)">

                <!-- USERNAME (Text Input instead of Email) -->
                <div class="input-group">
                    <label for="username"><i class="far fa-envelope"></i> Username</label>

                    <input type="text" id="username" placeholder="your username" required autocomplete="off">
                </div>

                <!-- PASSWORD -->
                <div class="input-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <div class="password-container">
                        <input type="password" id="password" placeholder="........" required>
                        <i class="far fa-eye toggle-password" onclick="togglePassword()"></i>
                    </div>
                </div>

                <!-- LOGIN BUTTON -->
                <button type="submit" class="btn-cta-primary full-width">
                    <center>
                        Let’s Go!
                    </center>
                </button>

                <!-- Divider -->
                <div class="divider">
                    Don't have an account?
                </div>

                <!-- Signup Options -->
                <div class="signup-options">
                    <a href="{{ url_for('guardian_signup') }}" class="signup-btn">
                        <i class="fas fa-user-plus"></i> Guardian Signup
                    </a>

                </div>
            </form>


        </div>
    </div>

    <!-- ================= POPUP MODAL ================= -->
    <div id="popup-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; justify-content:center; align-items:center;">
        <div style="background:white; border-radius:20px; padding:30px 35px; max-width:400px; width:90%; text-align:center; animation: popIn 0.3s ease; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
            <div id="popup-icon" style="font-size:3rem; margin-bottom:10px;">⚠️</div>
            <h2 id="popup-title" style="margin:0 0 10px 0; font-family:'Fredoka',sans-serif; color:#333;">Error</h2>
            <p id="popup-message" style="color:#555; font-size:1rem; margin-bottom:20px; line-height:1.5;"></p>
            <button onclick="closePopup()" style="background:linear-gradient(135deg,#FFC107,#FF9800); color:white; border:none; padding:12px 40px; border-radius:50px; font-size:1rem; font-weight:600; cursor:pointer; font-family:'Fredoka',sans-serif; transition:transform 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">OK</button>
        </div>
    </div>
    <style>
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>

    <!-- ================= SCRIPT ================= -->
    <script>
        /* ---------- LOADING SCREEN ---------- */
        window.addEventListener("load", () => {
            const loader = document.getElementById("loading-screen");
            setTimeout(() => {
                loader.style.opacity = "0";
                setTimeout(() => loader.style.display = "none", 500);
            }, 1000);
        });

        /* ---------- PASSWORD TOGGLE ---------- */
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = document.querySelector('.toggle-password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        /* ---------- POPUP FUNCTIONS ---------- */
        function showPopup(title, message, isSuccess = false) {
            document.getElementById('popup-icon').innerText = isSuccess ? '✅' : '⚠️';
            document.getElementById('popup-title').innerText = title;
            document.getElementById('popup-title').style.color = isSuccess ? '#10b981' : '#ef4444';
            document.getElementById('popup-message').innerText = message;
            document.getElementById('popup-modal').style.display = 'flex';
        }
        function closePopup() {
            document.getElementById('popup-modal').style.display = 'none';
        }

        /* ---------- LOGIN HANDLER ---------- */
        async function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();

            if (!username || !password) {
                showPopup('Missing Fields', 'Please enter both username and password!');
                return;
            }

            try {
                const response = await fetch("/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                const result = await response.json();

                if (result.success) {
                    window.location.href = result.redirect_url || "/guardian-dashboard";
                } else {
                    showPopup('Login Failed', 'Wrong username or password 😢');
                }

            } catch (error) {
                showPopup('Server Error', 'Server error. Please try again!');
            }
        }
    </script>

</body>

</html>
