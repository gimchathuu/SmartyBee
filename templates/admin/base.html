<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartyBee Admin - {% block title %}Dashboard{% endblock %}</title>
    <!-- Fonts & Icons -->
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary-orange: #f59e0b;
            --primary-yellow: #fbbf24;
            --bg-gradient: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
            --sidebar-bg: rgba(255, 255, 255, 0.8);
            --card-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.18);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            display: flex;
            min-height: 100vh;
            color: #1f2937;
        }

        /* Glassmorphism Sidebar */
        .sidebar {
            width: 280px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.02);
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 50px;
            text-decoration: none;
        }

        .brand-logo {
            width: 45px;
            height: 45px;
            object-fit: contain;
        }

        .brand-text {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1f2937;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            color: #64748b;
            text-decoration: none;
            border-radius: 16px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .menu-item:hover {
            background: rgba(245, 158, 11, 0.1);
            color: var(--primary-orange);
            transform: translateX(5px);
        }

        .menu-item.active {
            background: var(--primary-orange);
            color: white;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }

        .menu-item i {
            width: 20px;
            text-align: center;
            font-size: 1.1rem;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .page-header {
            margin-bottom: 30px;
        }

        .page-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: #1f2937;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--card-shadow);
        }

        /* UI Utilities */
        .btn {
            padding: 10px 20px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary-orange);
            color: white;
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.2);
        }

        .btn-primary:hover {
            background: #d97706;
            transform: translateY(-2px);
        }

        .logout-section {
            margin-top: auto;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            padding-top: 20px;
        }
    </style>
    {% block head %}{% endblock %}
</head>

<body>

    <!-- Sidebar -->
    <nav class="sidebar">
        <a href="{{ url_for('dashboard') }}" class="brand-container">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="brand-logo">
            <span class="brand-text">Admin</span>
        </a>

        <a href="{{ url_for('dashboard') }}"
            class="menu-item {% if request.endpoint == 'dashboard' %}active{% endif %}">
            <i class="fas fa-th-large"></i> Dashboard
        </a>
        <a href="{{ url_for('list_guardians') }}"
            class="menu-item {% if request.endpoint == 'list_guardians' %}active{% endif %}">
            <i class="fas fa-user-shield"></i> Guardians
        </a>
        <a href="{{ url_for('list_children') }}"
            class="menu-item {% if request.endpoint == 'list_children' %}active{% endif %}">
            <i class="fas fa-child"></i> Students
        </a>
        <a href="{{ url_for('manage_letters') }}"
            class="menu-item {% if request.endpoint == 'manage_letters' %}active{% endif %}">
            <i class="fas fa-font"></i> Curriculum
        </a>
        <a href="{{ url_for('view_feedback') }}"
            class="menu-item {% if request.endpoint == 'view_feedback' %}active{% endif %}">
            <i class="fas fa-comment-alt"></i> Feedback
        </a>

        <div class="logout-section">
            <a href="{{ url_for('logout') }}" class="menu-item" style="color: #ef4444;">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

</body>

</html>
